spring.profiles.active=test
server.port=${PORT:8080}
application.version='@pom.version@'

# Exibe os comandos SQL
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type=trace

# MySQL
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=jdbc:mysql://localhost:3306/ambrosio
spring.datasource.username=ambrosio
spring.datasource.password=ambrosio

spring.datasource.hikari.minimumIdle=10
spring.datasource.hikari.maximum-pool-size=25


flyway,
    check-location: true
    enabled: true
    url: jdbc:mysql://127.0.0.1:3306/splinter?useTimezone=true&serverTimezone=UTC&useSSL=false
    username: splinter
    password: splinter


